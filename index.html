<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LMWH / Heparin & HIT Support App</title>
<meta name="app-version" content="2026-03-27-cloudflare-trigger" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme:light;
    --bg:#f0f4f8;--surface:#fff;--surface-alt:#f7f9fc;
    --border:#e2e8f0;--border-focus:#6366f1;
    --text:#1e293b;--text-secondary:#64748b;--text-muted:#94a3b8;
    --accent:#4f46e5;--accent-light:#eef2ff;
    --danger:#dc2626;--danger-light:#fef2f2;--danger-border:#fecaca;
    --warning:#f59e0b;--warning-light:#fffbeb;--warning-border:#fde68a;
    --success:#059669;--success-light:#ecfdf5;--success-border:#a7f3d0;
    --info:#0ea5e9;--info-light:#f0f9ff;--info-border:#bae6fd;
    --orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;
    --purple:#7c3aed;--purple-light:#f5f3ff;--purple-border:#ddd6fe;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);
    --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
    --radius:12px;--radius-sm:8px;--radius-lg:16px;
  }
  html[data-theme="dark"]{
    color-scheme:dark;
    --bg:#0f1419;--surface:#1a2332;--surface-alt:#243044;
    --border:#334155;--border-focus:#818cf8;
    --text:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
    --accent:#818cf8;--accent-light:#312e81;
    --danger:#f87171;--danger-light:#3f1d1d;--danger-border:#7f1d1d;
    --warning:#fbbf24;--warning-light:#422006;--warning-border:#92400e;
    --success:#34d399;--success-light:#064e3b;--success-border:#065f46;
    --info:#38bdf8;--info-light:#0c4a6e;--info-border:#0e7490;
    --orange:#fb923c;--orange-light:#431407;--orange-border:#9a3412;
    --purple:#c4b5fd;--purple-light:#3b0764;--purple-border:#6d28d9;
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow:0 1px 3px rgba(0,0,0,.45),0 1px 2px rgba(0,0,0,.35);
    --shadow-md:0 4px 6px rgba(0,0,0,.4);
  }
  html[data-theme="dark"] .result-box.accent{border-color:#6366f1;background:var(--accent-light)}
  html[data-theme="dark"] .alert-danger{background:#450a0a;border-color:#991b1b;color:#fecaca}
  html[data-theme="dark"] .alert-warning{background:#451a03;border-color:#b45309;color:#fde68a}
  html[data-theme="dark"] .alert-info{background:#0c4a6e;border-color:#0369a1;color:#bae6fd}
  html[data-theme="dark"] .alert-orange{background:#431407;border-color:#9a3412;color:#fed7aa}
  html[data-theme="dark"] .alert-purple{background:#3b0764;border-color:#6d28d9;color:#e9d5ff}
  html[data-theme="dark"] .badge.danger{background:var(--danger-light);border-color:var(--danger-border);color:#fecaca}
  html[data-theme="dark"] .se-box{color:#fde68a;border-color:var(--warning-border);background:#451a03}
  html[data-theme="dark"] .se-box strong{color:#fcd34d}
  html[data-theme="dark"] .noload-content{color:#fdba74}
  html[data-theme="dark"] .noload-title{color:#fdba74}
  html[data-theme="dark"] .order-card{background:linear-gradient(135deg,#064e3b,#052e16);border-color:var(--success-border)}
  html[data-theme="dark"] .dur-badge{background:var(--info-light);color:#7dd3fc}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Sans Thai',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
  .app-container{max-width:1100px;margin:0 auto;padding:24px 16px 80px}
  .app-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .app-header-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto;justify-content:flex-end}
  .toolbar-group{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 8px;box-shadow:var(--shadow-sm)}
  .toolbar-label{font-size:.7rem;color:var(--text-muted);white-space:nowrap}
  .fs-btn{min-width:30px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface-alt);color:var(--text);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;line-height:1.2}
  .fs-btn:hover{background:var(--accent-light);border-color:var(--accent)}
  .fs-btn.fs-reset{font-size:.65rem;font-weight:500;min-width:auto;padding:4px 6px}
  .fs-range{width:80px;height:6px;accent-color:var(--accent);cursor:pointer;vertical-align:middle}
  .theme-toggle{width:40px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:1.05rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}
  .theme-toggle:hover{background:var(--surface-alt)}
  .theme-toggle.active-dark{background:var(--accent-light);border-color:var(--accent)}
  .app-header h1{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px}
  .app-header h1 .icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
  .lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .lang-toggle button{padding:6px 16px;border:none;background:transparent;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;color:var(--text-secondary);transition:all .15s}
  .lang-toggle button.active{background:var(--accent);color:#fff}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;transition:box-shadow .2s}
  .card:hover{box-shadow:var(--shadow-md)}
  .card-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .card-header .card-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .card-header h2{font-size:1rem;font-weight:600}
  .card-body{padding:20px}
  .form-grid{display:grid;gap:16px}
  .form-grid.cols-2{grid-template-columns:1fr 1fr}
  .form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .form-grid.cols-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:768px){.form-grid.cols-2,.form-grid.cols-3,.form-grid.cols-4{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.form-grid.cols-2,.form-grid.cols-3,.form-grid.cols-4{grid-template-columns:1fr}}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group label{font-size:.8rem;font-weight:500;color:var(--text-secondary)}
  .form-group input,.form-group select{font-family:inherit;font-size:max(16px,1rem);padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s;outline:none;width:100%}
  .form-group input:focus,.form-group select:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  .form-group input::placeholder{color:var(--text-muted)}
  .form-hint{font-size:.75rem;color:var(--text-muted)}
  .result-box{border-radius:var(--radius);padding:16px;border:1.5px solid var(--border);background:var(--surface-alt)}
  .result-box.accent{border-color:#c7d2fe;background:var(--accent-light)}
  .result-label{font-size:.75rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .result-value{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--accent)}
  .result-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);font-size:.875rem}
  .result-row:last-child{border-bottom:none}
  .result-row .label{color:var(--text-secondary)}
  .result-row .value{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
  .alert{border-radius:var(--radius);padding:14px 16px;font-size:.875rem;display:flex;gap:10px;align-items:flex-start;line-height:1.5;margin-bottom:12px}
  .alert .alert-icon{font-size:16px;flex-shrink:0;margin-top:2px}
  .alert-danger{background:var(--danger-light);border:1.5px solid var(--danger-border);color:#991b1b}
  .alert-warning{background:var(--warning-light);border:1.5px solid var(--warning-border);color:#92400e}
  .alert-info{background:var(--info-light);border:1.5px solid var(--info-border);color:#0c4a6e}
  .alert-orange{background:var(--orange-light);border:1.5px solid var(--orange-border);color:#9a3412}
  .alert-purple{background:var(--purple-light);border:1.5px solid var(--purple-border);color:#5b21b6}
  .alert strong{font-weight:600}
  .badge-row{display:flex;flex-wrap:wrap;gap:8px}
  .badge{font-size:.75rem;padding:6px 12px;border-radius:20px;font-weight:500;line-height:1.3;border:1px solid var(--border);background:var(--surface-alt);color:var(--text-secondary)}
  .badge.danger{background:var(--danger-light);border-color:var(--danger-border);color:#991b1b}
  .tabs-nav{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:20px;box-shadow:var(--shadow-sm);overflow-x:auto}
  .tab-btn{padding:10px 20px;border:none;background:transparent;font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;border-radius:var(--radius-sm);color:var(--text-secondary);transition:all .15s;white-space:nowrap;flex:1;text-align:center}
  .tab-btn:hover{background:var(--surface-alt)}
  .tab-btn.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:768px){.two-col{grid-template-columns:1fr}}
  .info-box{border-radius:var(--radius);padding:14px 16px;border:1.5px dashed var(--border);background:var(--surface-alt);font-size:.8rem;color:var(--text-secondary);line-height:1.6}
  .info-box strong{color:var(--text)}
  .clinical-notes{list-style:none}
  .clinical-notes li{padding:8px 0 8px 20px;position:relative;font-size:.875rem;color:var(--text-secondary);border-bottom:1px solid var(--border)}
  .clinical-notes li:last-child{border-bottom:none}
  .clinical-notes li::before{content:'';position:absolute;left:0;top:14px;width:8px;height:8px;border-radius:50%;background:var(--accent);opacity:.5}
  .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:600px){.score-grid{grid-template-columns:1fr}}
  .score-result{grid-column:1/-1;text-align:center;padding:24px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface-alt)}
  .score-number{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;line-height:1}
  .score-label{font-size:.875rem;margin-top:8px;font-weight:500}
  .prob-low{color:var(--success);border-color:var(--success-border);background:var(--success-light)}
  .prob-intermediate{color:#d97706;border-color:var(--warning-border);background:var(--warning-light)}
  .prob-high{color:var(--danger);border-color:var(--danger-border);background:var(--danger-light)}
  .disclaimer{text-align:center;padding:24px 16px 12px;font-size:.75rem;color:var(--text-muted);line-height:1.6}
  .app-footer{text-align:center;padding:12px 16px 24px;font-size:.75rem;color:var(--text-muted);line-height:1.6;border-top:1px solid var(--border);margin-top:4px}
  .app-footer a{color:var(--accent);font-weight:500;text-decoration:none}
  .app-footer a:hover{text-decoration:underline}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .animate-in{animation:fadeIn .3s ease-out}
  /* Order card */
  .order-card{border:2px solid var(--success-border);background:linear-gradient(135deg,var(--success-light),#f0fdf4)}
  .order-card .card-header{background:linear-gradient(135deg,#059669,#047857);border-bottom:none}
  .order-card .card-header h2{color:#fff}
  .order-card .card-header .card-icon{background:rgba(255,255,255,.2);color:#fff}
  .order-section{margin-bottom:20px}
  .order-section:last-child{margin-bottom:0}
  .order-section-title{font-size:.8rem;font-weight:600;color:var(--success);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .order-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;font-size:.875rem;line-height:1.7}
  .order-item:last-child{margin-bottom:0}
  .order-item .dose-hl{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--danger);font-size:1rem}
  .order-item .mono{font-family:'JetBrains Mono',monospace;font-weight:600}
  .allergy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:600px){.allergy-grid{grid-template-columns:1fr}}
  .allergy-item{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--danger-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:.8rem;line-height:1.5}
  .allergy-item .ai{flex-shrink:0;width:24px;height:24px;border-radius:6px;background:var(--danger-light);display:flex;align-items:center;justify-content:center;font-size:12px}
  .allergy-item strong{color:var(--danger);font-weight:600}
  .monitor-list{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  @media(max-width:600px){.monitor-list{grid-template-columns:1fr 1fr}}
  .monitor-item{background:var(--surface);border:1px solid var(--info-border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;font-size:.8rem}
  .monitor-item .mi{font-size:18px;margin-bottom:4px}
  .monitor-item .ml{color:var(--text-secondary);font-weight:500}
  .se-box{background:var(--surface);border:1.5px solid var(--warning-border);border-radius:var(--radius);padding:14px 16px;font-size:.8rem;line-height:1.7;color:#92400e}
  .se-box strong{color:#78350f}
  .copy-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--success);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s;margin-top:16px}
  .copy-btn:hover{background:#047857}
  .copy-btn.copied{background:var(--accent)}
  /* HIT pathway */
  .pathway-card{border:2px solid var(--purple-border)}
  .pathway-card .card-header{background:linear-gradient(135deg,#7c3aed,#6d28d9);border-bottom:none}
  .pathway-card .card-header h2{color:#fff}
  .pathway-card .card-header .card-icon{background:rgba(255,255,255,.2);color:#fff}
  .step-box{border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1.5px solid var(--border);background:var(--surface)}
  .step-box:last-child{margin-bottom:0}
  .step-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .step-title.do{color:var(--success)}
  .step-title.dont{color:var(--danger)}
  .step-title.diag{color:var(--info)}
  .step-title.lab{color:var(--purple)}
  .step-title.drug{color:var(--orange)}
  .step-content{font-size:.85rem;line-height:1.7;color:var(--text-secondary)}
  .step-content strong{color:var(--text)}
  .ddd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:700px){.ddd-grid{grid-template-columns:1fr}}
  .ddd-box{border-radius:var(--radius);padding:14px;border:1.5px solid var(--border)}
  .ddd-box.do-box{border-color:var(--success-border);background:var(--success-light)}
  .ddd-box.dont-box{border-color:var(--danger-border);background:var(--danger-light)}
  .ddd-box.diag-box{border-color:var(--info-border);background:var(--info-light)}
  .ddd-box h3{font-size:.85rem;font-weight:700;margin-bottom:8px}
  .ddd-box.do-box h3{color:#047857}
  .ddd-box.dont-box h3{color:#991b1b}
  .ddd-box.diag-box h3{color:#0369a1}
  .ddd-list{list-style:none;font-size:.8rem;line-height:1.8}
  .ddd-list li{padding-left:16px;position:relative;color:var(--text-secondary)}
  .ddd-list li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%}
  .do-box .ddd-list li::before{background:var(--success)}
  .dont-box .ddd-list li::before{background:var(--danger)}
  .diag-box .ddd-list li::before{background:var(--info)}
  .drug-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:8px}
  .drug-table th{background:var(--surface-alt);padding:8px 10px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);color:var(--text-secondary);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em}
  .drug-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
  .drug-table tr:last-child td{border-bottom:none}
  .drug-table .drug-name{font-weight:600;color:var(--text)}
  /* Periop styles */
  .periop-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:8px}
  .periop-table th{background:var(--surface-alt);padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid var(--border);color:var(--text-secondary);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  .periop-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top;line-height:1.6}
  .periop-table tr:last-child td{border-bottom:none}
  .periop-table .sx-type{font-weight:600;color:var(--text);white-space:nowrap}
  .periop-table .dose-cell{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--accent)}
  .periop-table tr:hover td{background:var(--accent-light)}
  .timeline-card{border:2px solid var(--info-border)}
  .timeline-card .card-header{background:linear-gradient(135deg,#0ea5e9,#0284c7);border-bottom:none}
  .timeline-card .card-header h2{color:#fff}
  .timeline-card .card-header .card-icon{background:rgba(255,255,255,.2);color:#fff}
  .tl-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
  .tl-row:last-child{border-bottom:none}
  .tl-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .tl-icon.preop{background:var(--warning-light);border:1px solid var(--warning-border)}
  .tl-icon.postop{background:var(--success-light);border:1px solid var(--success-border)}
  .tl-body{flex:1}
  .tl-drug{font-weight:600;color:var(--text);font-size:.875rem}
  .tl-detail{font-size:.8rem;color:var(--text-secondary);margin-top:4px;line-height:1.6}
  .tl-time{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--danger);font-size:.85rem}
  .noload-box{border:2px solid var(--orange-border);border-radius:var(--radius);background:var(--orange-light);padding:16px;margin-bottom:12px}
  .noload-title{font-size:.85rem;font-weight:700;color:#9a3412;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .noload-content{font-size:.825rem;line-height:1.7;color:#78350f}
  .noload-content strong{color:#7c2d12}
  .prophylaxis-card{border:2px solid var(--success-border)}
  .prophylaxis-card .card-header{background:linear-gradient(135deg,#059669,#047857);border-bottom:none}
  .prophylaxis-card .card-header h2{color:#fff}
  .prophylaxis-card .card-header .card-icon{background:rgba(255,255,255,.2);color:#fff}
  .periop-sub-tabs{display:flex;gap:4px;margin-bottom:16px}
  .periop-sub-tab{padding:8px 14px;border:1.5px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;color:var(--text-secondary);transition:all .15s;white-space:nowrap}
  .periop-sub-tab:hover{background:var(--surface-alt);border-color:var(--accent)}
  .periop-sub-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .dur-badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:12px;background:var(--info-light);border:1px solid var(--info-border);color:#0369a1;font-weight:500;margin-left:4px}
</style>

function round(v,d=1){if(!Number.isFinite(v))return 0;const f=10**d;return Math.round(v*f)/f}
function cockcroftGault(a,w,s,sex){if(!a||!w||!s||a<=0||s<=0)return null;const b=((140-a)*w)/(72*s);return sex==='female'?b*.85:b}
function parseClock(c){if(!/^\d{1,2}:\d{2}$/.test(c))return null;const[h,m]=c.split(':').map(Number);if(h<0||h>23||m<0||m>59)return null;return h+m/60}
function elapsed(s,e){const a=parseClock(s),b=parseClock(e);if(a===null||b===null)return null;let d=b-a;if(d<0)d+=24;return round(d,2)}
function ufhDecay(h){if(h<.5)return 1;if(h<1)return .75;if(h<2)return .5;if(h<3)return .25;return .1}
function scDecay(h){if(h<1)return 1;if(h<2)return .75;if(h<4)return .5;if(h<8)return .25;return .1}
function fmtNum(v,d=0){return Number.isFinite(v)?round(v,d).toLocaleString('en-US'):'—'}
function fmtDose(v,unit='',d=0){return Number.isFinite(v)?`${fmtNum(v,d)} ${unit}`.trim():'—'}
