  therapy:'การให้ยาและคำสั่งใช้ยา',lmwhGuide:'คู่มือขนาดยา LMWH / UFH',agent:'ยา',indication:'ข้อบ่งใช้',prophylaxis:'ป้องกัน',treatment:'รักษา',context:'บริบททางคลินิก',general:'ผู้ป่วยอายุรกรรม/ศัลยกรรมทั่วไป',ortho:'THR / TKR / hip fracture',startUFH:'เริ่ม UFH infusion',calcDose:'ขนาดยาที่คำนวณได้',renalNote:'หมายเหตุเรื่องไต',monitoringNote:'หมายเหตุการติดตาม',practicalOrder:'คำสั่งใช้ยาที่แนะนำ',antiXaNote:'Anti-Xa / การติดตาม',lmwhReference:'ขนาดยา LMWH อ้างอิงตาม handout PDF ที่แนบ',therapyWeightNote:'LMWH ขนาดรักษาในโปรแกรมนี้คำนวณตาม actual body weight และไม่ตั้งเพดานขนาดยา',renalModerate:'ไตบกพร่องระดับปานกลางอาจเพิ่มความเสี่ยงเลือดออกเมื่อใช้ LMWH ขนาดรักษาเต็มขนาด ควรใช้ด้วยความระวังและพิจารณาติดตามเพิ่มเติม',crclNeeded:'กรอกอายุ น้ำหนัก serum creatinine และเพศ เพื่อคำนวณ CrCl',ufhNomogram:'การปรับ UFH ตาม aPTT ratio',currentRate:'อัตรา infusion ปัจจุบัน (units/ชม.)',currentAptt:'aPTT ratio ปัจจุบัน',nextStep:'คำแนะนำการปรับยา',ufhCheck:'ตรวจ aPTT ซ้ำ 6 ชม. หลังเริ่มหรือหลังปรับขนาดยา',ufhTarget:'เป้าหมาย aPTT ratio ใน prototype นี้ประมาณ 1.5-2.5',hold:'หยุดชั่วคราว',noChange:'ไม่ต้องปรับ',increase:'เพิ่มอัตรา',decrease:'ลดอัตรา',bolus:'Bolus',targetRange:'อยู่ในช่วงรักษา',lmwhOrderTitle:'คำสั่ง LMWH / UFH',weightBased:'คำนวณตามน้ำหนัก',dailyDose:'ขนาดยาต่อวัน',selectedDose:'ขนาดยาที่เลือก',contra:'ข้อห้ามใช้ / ข้อควรระวัง',renalContraFond:'Fondaparinux ห้ามใช้เมื่อ CrCl <30 mL/min',tinzLimit:'Tinzaparin: ควรหลีกเลี่ยงหรือปรึกษาผู้เชี่ยวชาญเมื่อ CrCl <20 mL/min',bemiLimit:'Bemiparin: ต้องลดขนาดยาเมื่อ CrCl <30 mL/min',enoxLimit:'Enoxaparin: ต้องปรับลดขนาดยาเมื่อ CrCl <30 mL/min',monitorRenal:'พิจารณา anti-Xa เมื่อกังวลการสะสมยา ไตบกพร่อง น้ำหนักตัวมาก/น้อยมาก หรือมีความเสี่ยงเลือดออก',initialUfhOrder:'คำสั่งเริ่ม UFH สำหรับ VTE',ufhStartNote:'nomogram prototype: bolus 80 U/kg IV แล้วตามด้วย 18 U/kg/hr หากไม่มีข้อห้าม',ratioBand1:'aPTT ratio <1.2: bolus 80 U/kg และเพิ่ม infusion 4 U/kg/hr',ratioBand2:'aPTT ratio 1.2-1.49: bolus 40 U/kg และเพิ่ม infusion 2 U/kg/hr',ratioBand3:'aPTT ratio 1.5-2.5: อยู่ในช่วงรักษา ไม่ต้องปรับ',ratioBand4:'aPTT ratio 2.51-3.0: ลด infusion 2 U/kg/hr',ratioBand5:'aPTT ratio >3.0: หยุด 1 ชม. แล้วลด infusion 3 U/kg/hr',orderLabs:'ติดตาม CBC, PT/INR, aPTT, creatinine, platelet count ทั้งก่อนเริ่มและระหว่างรักษา',notRequired:'โดยทั่วไปไม่ต้องติดตาม routine',enoxaparin:'Enoxaparin',tinzaparin:'Tinzaparin',bemiparin:'Bemiparin',fondaparinux:'Fondaparinux',ufhMixTitle:'การผสม UFH infusion และความเข้มข้น',ufhMixIntro:'ในคำสั่งควรระบุ: ดึง heparin กี่ unit, ผสมในสารละลายกี่ mL, ได้ความเข้มข้นสุดท้ายเท่าใด (หรืออัตรา infusion เป็น mL/ชม.) ตาม protocol โรงพยาบาล',ufhMixLine1:'Heparin 25,000 U + NSS/D5W 250 mL → 100 U/mL (1 mL/ชม. = 100 U/ชม.)',ufhMixLine2:'Heparin 25,000 U + NSS/D5W 500 mL → 50 U/mL (1 mL/ชม. = 50 U/ชม.)',ufhMixLine3:'ความแรงของ ampoule/vial แต่ละที่อาจต่างกัน (เช่น 5,000 U/mL × 5 mL = 25,000 U) — ตรวจฉลากก่อนผสม',ufhMixTargetLabel:'อัตรา infusion เป้าหมาย (โนโมแกรม)',ufhMixPump100:'ถุง 100 U/mL (25,000 U/250 mL): ปรับ pump',ufhMixPump50:'ถุง 50 U/mL (25,000 U/500 mL): ปรับ pump',ufhMixPumpUnit:'mL/ชม.',ufhMixOrderExample:'ตัวอย่างคำสั่ง: "Heparin sodium 25,000 units เติมใน NSS 250 mL; IV infusion ที่ ___ mL/ชม. ตาม protocol"',ufhMixOrderLine1:'[ผสม] 25,000 U + 250 mL NSS/D5W → 100 U/mL',ufhMixOrderLine2:'[ผสม] 25,000 U + 500 mL NSS/D5W → 50 U/mL',ufhTherapy:'UFH infusion',
}
};

function App(){
  const[lang,setLang]=useState('th');
  const[theme,setTheme]=useState(()=>{try{return localStorage.getItem('hg-theme')==='dark'?'dark':'light'}catch(_){return 'light'}});
  const[fontScale,setFontScale]=useState(()=>{try{const v=parseFloat(localStorage.getItem('hg-font-scale'));return Number.isFinite(v)&&v>=0.85&&v<=1.4?v:1}catch(_){return 1}});
  const[tab,setTab]=useState('reversal');
  const[age,setAge]=useState('');const[weight,setWeight]=useState('');const[scr,setScr]=useState('');const[sex,setSex]=useState('male');
  const[route,setRoute]=useState('iv');const[scenario,setScenario]=useState('major');const[hitSusp,setHitSusp]=useState('no');const[procRisk,setProcRisk]=useState('moderate');
  const[hepRate,setHepRate]=useState('');const[hepBolus,setHepBolus]=useState('');const[scDose,setScDose]=useState('');
  const[hrsSince,setHrsSince]=useState('');const[stopClk,setStopClk]=useState('');const[curClk,setCurClk]=useState('');const[apttR,setApttR]=useState('');
  const[enoxD,setEnoxD]=useState('');const[enoxH,setEnoxH]=useState('');
  const[agent,setAgent]=useState('enoxaparin');const[indication,setIndication]=useState('treatment');const[context,setContext]=useState('general');const[ufhCurrentRate,setUfhCurrentRate]=useState('');const[ufhCurrentAptt,setUfhCurrentAptt]=useState('');
  const[fT,setFT]=useState({tc:'0',tm:'0',th:'0',oc:'0'});
  const[copied,setCopied]=useState(false);
  const[periopSub,setPeriopSub]=useState('caprini');
  const[noLoadRate,setNoLoadRate]=useState('12');
  // Caprini factors: key → point value
  const[cap,setCap]=useState({});
  const t=L[lang];
  const crcl=useMemo(()=>cockcroftGault(+age,+weight,+scr,sex),[age,weight,scr,sex]);
  const autoH=useMemo(()=>elapsed(stopClk,curClk),[stopClk,curClk]);
  const effH=useMemo(()=>{const m=+hrsSince;if(Number.isFinite(m)&&m>0)return m;return autoH},[hrsSince,autoH]);
  const ufh=useMemo(()=>{
    const hrs=effH??0,r=+hepRate,b=+hepBolus,s=+scDose;if(hitSusp==='yes')return null;
    let exp=0,frac=0;
    if(route==='iv'){frac=ufhDecay(hrs);exp=(r>0?r*Math.min(hrs,3)*frac:0)+(b>0?b*frac:0)}
    else{frac=scDecay(hrs);exp=s>0?s*frac:0}
    if(exp<=0)return null;
    return{exp:round(exp),ini:round(Math.min(50,exp/100)),add:round(Math.min(50,exp/200)),frac:round(frac*100,0)}
  },[route,hepRate,hepBolus,scDose,effH,hitSusp]);
  const apttSug=useMemo(()=>{const r=+apttR;if(!r)return null;return r<=1.2?t.apttNormal:t.apttHigh},[apttR,t]);
  const procAdv=useMemo(()=>({low:t.lowAdv,moderate:t.modAdv,high:t.highAdv,veryHigh:t.vhAdv}[procRisk]),[procRisk,t]);
  const therapyCalc=useMemo(()=>{
    const wt=+weight, cr=crcl;
    if(!wt||wt<=0) return null;
    const renal30 = Number.isFinite(cr) && cr < 30;
    const renal20 = Number.isFinite(cr) && cr < 20;
    const renModerate = Number.isFinite(cr) && cr >= 30 && cr <= 50;
    if(agent==='ufhTherapy'){
      const bolus = round(wt*80);
      const rate = round(wt*18);
      return {agent:'UFH', selected:`Bolus ${fmtNum(bolus)} units IV once, then ${fmtNum(rate)} units/hr IV infusion`, daily:`${fmtNum(rate*24)} units/day infusion`, order:[`Heparin ${fmtNum(bolus)} units IV bolus once`, `Then heparin infusion ${fmtNum(rate)} units/hr IV`, t.ufhMixOrderLine1, t.ufhMixOrderLine2], renal:'No LMWH renal adjustment; use aPTT-guided titration.', monitor:t.ufhCheck+' '+t.ufhTarget, caution:renModerate?t.renalModerate:''};
    }
    if(agent==='enoxaparin'){
      if(indication==='prophylaxis'){
        const dose = context==='ortho' ? (renal30? '30 mg SC OD':'30 mg SC BID') : (renal30? '30 mg SC OD':'40 mg SC OD');
        return {agent:t.enoxaparin, selected:dose, daily: context==='ortho' ? (renal30?'30 mg/day':'60 mg/day') : (renal30?'30 mg/day':'40 mg/day'), order:[`Enoxaparin ${dose}`], renal:t.enoxLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renModerate?t.renalModerate:''};
      }
      const dose = renal30 ? `1 mg/kg SC OD = ${fmtNum(wt,1)} mg SC OD` : `1 mg/kg SC BID = ${fmtNum(wt,1)} mg SC BID`;
      const daily = renal30 ? `${fmtNum(wt,1)} mg/day` : `${fmtNum(wt*2,1)} mg/day`;
      return {agent:t.enoxaparin, selected:dose, daily, order:[`Enoxaparin ${dose}`], renal:t.enoxLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renModerate?t.renalModerate:''};
    }
    if(agent==='tinzaparin'){
      if(indication==='prophylaxis'){
        return {agent:t.tinzaparin, selected:'3,500 U SC OD or 4,500 U SC OD', daily:'3,500-4,500 U/day', order:['Tinzaparin 3,500 U SC OD (or 4,500 U SC OD by protocol)'], renal:t.tinzLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renal20?t.tinzLimit:(renModerate?t.renalModerate:'')};
      }
      const dose=round(wt*175);
      return {agent:t.tinzaparin, selected:`175 IU/kg SC OD = ${fmtNum(dose)} IU SC OD`, daily:`${fmtNum(dose)} IU/day`, order:[`Tinzaparin ${fmtNum(dose)} IU SC OD`], renal:t.tinzLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renal20?t.tinzLimit:(renModerate?t.renalModerate:'')};
    }
    if(agent==='bemiparin'){
      if(indication==='prophylaxis'){
        const dose = renal30 ? '2,500 IU SC OD' : '3,500 IU SC OD';
        return {agent:t.bemiparin, selected:dose, daily:dose.replace(' SC OD','/day'), order:[`Bemiparin ${dose}`], renal:t.bemiLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renModerate?t.renalModerate:''};
      }
      let dose;
      if(renal30){
        if(wt<=50) dose='3,500 IU SC OD';
        else if(wt<=70) dose='5,000 IU SC OD';
        else if(wt<=100) dose='7,500 IU SC OD';
        else dose=`ลด 25% จากขนาดปกติ ≈ ${fmtNum(wt*115*0.75)} IU SC OD`;
      } else {
        if(wt<=50) dose='5,000 IU SC OD';
        else if(wt<=70) dose='7,500 IU SC OD';
        else if(wt<=100) dose='10,000 IU SC OD';
        else dose=`115 IU/kg SC OD = ${fmtNum(wt*115)} IU SC OD`;
      }
      return {agent:t.bemiparin, selected:dose, daily:dose.replace(' SC OD','/day'), order:[`Bemiparin ${dose}`], renal:t.bemiLimit, monitor:t.notRequired+'. '+t.monitorRenal, caution:renModerate?t.renalModerate:''};
    }
    if(agent==='fondaparinux'){
      if(renal30) return {agent:t.fondaparinux, selected:t.renalContraFond, daily:'—', order:[t.renalContraFond], renal:t.renalContraFond, monitor:t.notRequired, caution:t.renalContraFond};
      const dose = indication==='prophylaxis' ? '2.5 mg SC OD' : (wt<50?'5 mg SC OD':wt<=100?'7.5 mg SC OD':'10 mg SC OD');
      return {agent:t.fondaparinux, selected:dose, daily:dose.replace(' SC OD','/day'), order:[`Fondaparinux ${dose}`], renal:t.renalContraFond, monitor:t.notRequired, caution:''};
    }
    return null;
  },[agent,indication,context,weight,crcl,t]);
  const ufhAdj=useMemo(()=>{
    const wt=+weight, rate=+ufhCurrentRate, ratio=+ufhCurrentAptt;
    if(agent!=='ufhTherapy' || !wt || !ratio) return null;
    if(ratio<1.2){const bol=round(wt*80), delta=round(wt*4); return {action:t.increase, text:t.ratioBand1, bolus:`${fmtNum(bol)} units`, newRate: rate? Math.max(0, round(rate+delta)) : null};}
    if(ratio<1.5){const bol=round(wt*40), delta=round(wt*2); return {action:t.increase, text:t.ratioBand2, bolus:`${fmtNum(bol)} units`, newRate: rate? Math.max(0, round(rate+delta)) : null};}
    if(ratio<=2.5){return {action:t.noChange, text:t.ratioBand3, bolus:'—', newRate: rate||null};}
    if(ratio<=3){const delta=round(wt*2); return {action:t.decrease, text:t.ratioBand4, bolus:'—', newRate: rate? Math.max(0, round(rate-delta)) : null};}
    const delta=round(wt*3); return {action:t.hold, text:t.ratioBand5, bolus:'—', newRate: rate? Math.max(0, round(rate-delta)) : null};
  },[agent,weight,ufhCurrentRate,ufhCurrentAptt,t]);
  const scenAdv=useMemo(()=>{if(scenario==='major')return t.stopHeparin+' '+t.sourceControl;if(scenario==='urgent')return t.procedureNote+' '+procAdv;return t.overdoseNote},[scenario,t,procAdv]);
  const enoxProt=useMemo(()=>{const d=+enoxD,h=+enoxH;if(!d||h<0)return null;if(h<8)return round(d)+' mg';if(h<=12)return round(d*.5)+' mg';return lang==='en'?'Protamine may be of limited benefit':'Protamine อาจให้ประโยชน์จำกัด'},[enoxD,enoxH,lang]);
  const hitSc=useMemo(()=>+fT.tc+ +fT.tm+ +fT.th+ +fT.oc,[fT]);
  const hitProb=useMemo(()=>{if(hitSc<=3)return{text:t.lowProb,cls:'prob-low',level:'low'};if(hitSc<=5)return{text:t.intProb,cls:'prob-intermediate',level:'int'};return{text:t.highProb,cls:'prob-high',level:'high'}},[hitSc,t]);
  const protDose=useMemo(()=>{if(ufh)return ufh.ini;if(enoxProt&&!enoxProt.includes('limited')&&!enoxProt.includes('จำกัด'))return parseFloat(enoxProt);return null},[ufh,enoxProt]);
  const infTime=useMemo(()=>protDose?Math.max(10,Math.ceil(protDose/5)):10,[protDose]);
  const vials=useMemo(()=>{if(!protDose)return null;const ml=protDose/10;return{ml:round(ml,1),n:Math.ceil(ml/5)}},[protDose]);
  const orderTxt=useMemo(()=>{if(!protDose)return '';const isE=!ufh&&enoxProt;return['=== PROTAMINE ORDER ===','Protamine sulfate '+protDose+' mg IV',vials?'('+vials.ml+' mL of 10 mg/mL)':'','Dilute in NSS/D5W 50-100 mL','IV drip over '+infTime+' min (max 5 mg/min)','Max single dose: 50 mg','','Indication: '+(isE?'Enoxaparin':'UFH')+' reversal',ufh?'Est. exposure: '+ufh.exp+' units ('+ufh.frac+'% active)':'',ufh?'Additional: '+ufh.add+' mg after 10-15 min':'','','ALLERGY: Fish allergy? Vasectomy? Prior protamine? NPH insulin?','','MONITOR: BP/HR/SpO2 q5min, aPTT 15min post-dose','Resuscitation equipment + epinephrine at bedside','','Heparin rebound may occur 2-8 hr post-protamine'].filter(Boolean).join('\n')},[protDose,ufh,enoxProt,vials,infTime]);
  const doCopy=useCallback(()=>{if(!orderTxt)return;navigator.clipboard.writeText(orderTxt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)}).catch(()=>{})},[orderTxt]);

  // Caprini Risk Assessment
  const capToggle=useCallback((k,pts)=>{setCap(p=>{const n={...p};if(n[k])delete n[k];else n[k]=pts;return n})},[]);
  const capScore=useMemo(()=>Object.values(cap).reduce((a,b)=>a+b,0),[cap]);
  const capRisk=useMemo(()=>{
    if(capScore===0) return {level:'verylow',cls:'prob-low'};
    if(capScore<=2) return {level:'low',cls:'prob-low'};
    if(capScore<=4) return {level:'moderate',cls:'prob-intermediate'};
    return {level:'high',cls:'prob-high'};
  },[capScore]);
  const[bleedRisk,setBleedRisk]=useState('low');

  useEffect(()=>{try{localStorage.setItem('hg-theme',theme)}catch(_){}},[theme]);
  useEffect(()=>{try{localStorage.setItem('hg-font-scale',String(fontScale))}catch(_){}},[fontScale]);
  useEffect(()=>{if(theme==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.removeAttribute('data-theme')},[theme]);
  useEffect(()=>{document.documentElement.style.fontSize=`${Math.round(16*fontScale*100)/100}px`},[fontScale]);

  const noLoadCalc=useMemo(()=>{
    const wt=+weight, r=+noLoadRate;
    if(!wt||wt<=0||!r||r<=0) return null;
    const rateU=round(wt*r);
    const maxRate = r>=12 ? Math.min(rateU,1000) : rateU;
    return {rateU:maxRate, ml100:round(maxRate/100,1), ml50:round(maxRate/50,1)};
  },[weight,noLoadRate]);

  // HIT action text based on score
  const hitActionText = useMemo(()=>{
    if(hitProb.level==='low') return t.hitLowAction;
    if(hitProb.level==='int') return t.hitIntAction;
    return t.hitHighAction;
  },[hitProb,t]);

  return(
    <div className="app-container">
      <div className="app-header">
        <h1><span className="icon">💉</span>{t.title}</h1>
        <div className="app-header-tools">
          <div className="toolbar-group">
            <span className="toolbar-label">{t.fontSize}</span>
            <button type="button" className="fs-btn" onClick={()=>setFontScale(s=>Math.max(0.85,round(s-0.05,2)))} aria-label={t.fontSmaller} title={t.fontSmaller}>A−</button>
            <input type="range" className="fs-range" min={85} max={140} step={5} value={Math.round(fontScale*100)} onChange={e=>setFontScale(+e.target.value/100)} aria-label={t.fontSize} title={t.fontSize}/>
            <button type="button" className="fs-btn" onClick={()=>setFontScale(s=>Math.min(1.4,round(s+0.05,2)))} aria-label={t.fontLarger} title={t.fontLarger}>A+</button>
            <button type="button" className="fs-btn fs-reset" onClick={()=>setFontScale(1)} title={t.fontReset}>{Math.round(fontScale*100)}%</button>
          </div>
          <button type="button" className={'theme-toggle'+(theme==='dark'?' active-dark':'')} onClick={()=>setTheme(theme==='light'?'dark':'light')} aria-label={t.themeToggleAria} title={theme==='light'?t.themeDark:t.themeLight}>{theme==='light'?'🌙':'☀️'}</button>
          <div className="lang-toggle">
            <button className={lang==='th'?'active':''} onClick={()=>setLang('th')}>ไทย</button>
            <button className={lang==='en'?'active':''} onClick={()=>setLang('en')}>EN</button>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-icon" style={{background:'#eef2ff',color:'#4f46e5'}}>👤</div><h2>{t.patient}</h2></div>
        <div className="card-body">
          <div className="form-grid cols-4">
            <div className="form-group"><label>{t.age}</label><input type="number" value={age} onChange={e=>setAge(e.target.value)} placeholder="65"/></div>
            <div className="form-group"><label>{t.weight}</label><input type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="60"/></div>
            <div className="form-group"><label>{t.scr}</label><input type="number" step="0.1" value={scr} onChange={e=>setScr(e.target.value)} placeholder="1.2"/></div>
            <div className="form-group"><label>{t.sex}</label><select value={sex} onChange={e=>setSex(e.target.value)}><option value="male">{t.male}</option><option value="female">{t.female}</option></select></div>
          </div>
          <div style={{marginTop:16}}><div className="result-box accent"><div className="result-label">{t.crcl}</div><div className="result-value">{crcl?round(crcl)+' mL/min':'—'}</div></div></div>
        </div>
      </div>

      <div className="tabs-nav">
        <button className={'tab-btn'+(tab==='therapy'?' active':'')} onClick={()=>setTab('therapy')}>{t.therapy}</button>
        <button className={'tab-btn'+(tab==='periop'?' active':'')} onClick={()=>setTab('periop')}>{t.periop}</button>
        <button className={'tab-btn'+(tab==='reversal'?' active':'')} onClick={()=>setTab('reversal')}>{t.reversal}</button>
        <button className={'tab-btn'+(tab==='hit4ts'?' active':'')} onClick={()=>setTab('hit4ts')}>{t.hit4ts}</button>
      </div>


      {tab==='therapy'&&(
        <div className="animate-in">
          <div className="two-col">
            <div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#eef2ff',color:'#4f46e5'}}>📦</div><h2>{t.lmwhGuide}</h2></div>
                <div className="card-body">
                  <div className="form-grid cols-2">
                    <div className="form-group"><label>{t.agent}</label><select value={agent} onChange={e=>setAgent(e.target.value)}><option value="enoxaparin">{t.enoxaparin}</option><option value="tinzaparin">{t.tinzaparin}</option><option value="bemiparin">{t.bemiparin}</option><option value="fondaparinux">{t.fondaparinux}</option><option value="ufhTherapy">{t.ufhTherapy}</option></select></div>
                    <div className="form-group"><label>{t.indication}</label><select value={indication} onChange={e=>setIndication(e.target.value)} disabled={agent==='ufhTherapy'}><option value="prophylaxis">{t.prophylaxis}</option><option value="treatment">{t.treatment}</option></select></div>
                    <div className="form-group"><label>{t.context}</label><select value={context} onChange={e=>setContext(e.target.value)} disabled={agent!=='enoxaparin' || indication!=='prophylaxis'}><option value="general">{t.general}</option><option value="ortho">{t.ortho}</option></select></div>
                    <div className="form-group"><label>{t.crcl}</label><input value={crcl?round(crcl).toString():'—'} disabled /></div>
                  </div>
                  {!crcl && <div className="alert alert-warning" style={{marginTop:16}}><span className="alert-icon">ℹ️</span><div>{t.crclNeeded}</div></div>}
                  {therapyCalc && (
                    <>
                      <div className="form-grid cols-2" style={{marginTop:16}}>
                        <div className="result-box accent"><div className="result-label">{t.selectedDose}</div><div className="result-value" style={{fontSize:'1.05rem'}}>{therapyCalc.selected}</div></div>
                        <div className="result-box"><div className="result-row"><span className="label">{t.weightBased}</span><span className="value">{weight?weight+' kg':'—'}</span></div><div className="result-row"><span className="label">{t.dailyDose}</span><span className="value">{therapyCalc.daily}</span></div><div className="result-row"><span className="label">{t.renalNote}</span><span className="value" style={{whiteSpace:'normal',textAlign:'right',maxWidth:'60%'}}>{therapyCalc.renal}</span></div></div>
                      </div>
                      <div className="alert alert-info" style={{marginTop:16}}><span className="alert-icon">📘</span><div><strong>{t.lmwhReference}</strong><br/>{t.therapyWeightNote}</div></div>
                      {therapyCalc.caution && <div className="alert alert-warning"><span className="alert-icon">⚠️</span><div>{therapyCalc.caution}</div></div>}
                      <div className="info-box"><strong>{t.antiXaNote}:</strong> {therapyCalc.monitor}<br/><strong>{t.monitoringNote}:</strong> {t.orderLabs}</div>
                    </>
                  )}
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#f0f9ff',color:'#0ea5e9'}}>📝</div><h2>{t.lmwhOrderTitle}</h2></div>
                <div className="card-body">
                  {therapyCalc ? <div className="order-item" style={{whiteSpace:'pre-wrap'}}>{therapyCalc.order.join('\n')}{'\n'}{t.orderLabs}</div> : <div className="info-box">{t.crclNeeded}</div>}
                </div>
              </div>
            </div>
            <div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#fef2f2',color:'#dc2626'}}>🩸</div><h2>{t.initialUfhOrder}</h2></div>
                <div className="card-body">
                  <div className="info-box"><strong>{t.ufhStartNote}</strong></div>
                  {weight && <div className="result-box accent" style={{marginTop:16}}><div className="result-label">{t.calcDose}</div><div className="result-value" style={{fontSize:'1.05rem'}}>{fmtNum((+weight||0)*80)} U IV bolus → {fmtNum((+weight||0)*18)} U/hr</div></div>}
                  <div className="step-box" style={{marginTop:16}}>
                    <div className="step-title diag">{t.ufhMixTitle}</div>
                    <div className="step-content">{t.ufhMixIntro}</div>
                    <ul className="clinical-notes" style={{marginTop:12}}><li>{t.ufhMixLine1}</li><li>{t.ufhMixLine2}</li><li>{t.ufhMixLine3}</li></ul>
                    {weight && (()=>{const rateU=round((+weight||0)*18);const ml100=round(rateU/100,2);const ml50=round(rateU/50,2);return(
                      <div className="result-box accent" style={{marginTop:12}}>
                        <div className="result-label">{t.ufhMixTargetLabel}</div>
                        <div className="result-value" style={{fontSize:'1.1rem'}}>{fmtNum(rateU)} U/hr</div>
                        <div className="result-row" style={{marginTop:8}}><span className="label">{t.ufhMixPump100}</span><span className="value">{fmtNum(ml100,1)} {t.ufhMixPumpUnit}</span></div>
                        <div className="result-row"><span className="label">{t.ufhMixPump50}</span><span className="value">{fmtNum(ml50,1)} {t.ufhMixPumpUnit}</span></div>
                      </div>
                    );})()}
                    <div className="info-box" style={{marginTop:12}}>{t.ufhMixOrderExample}</div>
                  </div>
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#fff7ed',color:'#ea580c'}}>📈</div><h2>{t.ufhNomogram}</h2></div>
                <div className="card-body">
                  <div className="form-grid cols-2">
                    <div className="form-group"><label>{t.currentRate}</label><input type="number" value={ufhCurrentRate} onChange={e=>setUfhCurrentRate(e.target.value)} placeholder="1000" /></div>
                    <div className="form-group"><label>{t.currentAptt}</label><input type="number" step="0.01" value={ufhCurrentAptt} onChange={e=>setUfhCurrentAptt(e.target.value)} placeholder="1.8" /></div>
                  </div>
                  <div className="step-box" style={{marginTop:16}}><div className="step-content">• {t.ratioBand1}<br/>• {t.ratioBand2}<br/>• {t.ratioBand3}<br/>• {t.ratioBand4}<br/>• {t.ratioBand5}<br/><br/><strong>{t.ufhCheck}</strong></div></div>
                  {ufhAdj && <div className="result-box accent"><div className="result-row"><span className="label">{t.nextStep}</span><span className="value">{ufhAdj.action}</span></div><div className="result-row"><span className="label">{t.bolus}</span><span className="value">{ufhAdj.bolus}</span></div><div className="result-row"><span className="label">{t.currentRate}</span><span className="value">{ufhCurrentRate?ufhCurrentRate+' U/hr':'—'}</span></div><div className="result-row"><span className="label">New rate</span><span className="value">{ufhAdj.newRate!==null?ufhAdj.newRate+' U/hr':'—'}</span></div><div style={{marginTop:10,fontSize:'.82rem',color:'var(--text-secondary)'}}>{ufhAdj.text}</div></div>}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ===== PERIOP / PROPHYLAXIS TAB ===== */}
      {tab==='periop'&&(
        <div className="animate-in">
          <div className="periop-sub-tabs">
            <button className={'periop-sub-tab'+(periopSub==='caprini'?' active':'')} onClick={()=>setPeriopSub('caprini')}>🛡️ {t.periopSubCaprini}</button>
            <button className={'periop-sub-tab'+(periopSub==='timeline'?' active':'')} onClick={()=>setPeriopSub('timeline')}>⏱️ {t.periopSubTimeline}</button>
            <button className={'periop-sub-tab'+(periopSub==='noload'?' active':'')} onClick={()=>setPeriopSub('noload')}>💧 {t.periopSubNoLoad}</button>
          </div>

          {/* === CAPRINI VTE RISK ASSESSMENT === */}
          {periopSub==='caprini'&&(
            <div className="animate-in">
              <div className="card prophylaxis-card">
                <div className="card-header"><div className="card-icon">🛡️</div><h2>{t.capTitle}</h2></div>
                <div className="card-body">
                  {/* Score Result - sticky top */}
                  <div className={'score-result '+capRisk.cls} style={{marginBottom:20,position:'sticky',top:0,zIndex:10,boxShadow:'var(--shadow-md)'}}>
                    <div className="score-number">{capScore}</div>
                    <div style={{fontSize:'.8rem',color:'inherit',opacity:.7,marginTop:4}}>{lang==='th'?'คะแนนรวม':'Total Score'}: {capScore}</div>
                    <div className="score-label">{capRisk.level==='verylow'?t.capVeryLow:capRisk.level==='low'?t.capLowRisk:capRisk.level==='moderate'?t.capModRisk:t.capHighRisk}</div>
                    <button onClick={()=>{setCap({});setBleedRisk('low')}} style={{marginTop:8,padding:'4px 14px',border:'1.5px solid currentColor',borderRadius:20,background:'transparent',color:'inherit',fontFamily:'inherit',fontSize:'.75rem',fontWeight:600,cursor:'pointer',opacity:.7}}>{t.capReset}</button>
                  </div>

                  {/* 1 Point Factors */}
                  <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--success)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>🟢 {t.cap1pt}</div>
                  <div className="allergy-grid" style={{marginBottom:20}}>
                    {[['age4160',t.capAge4160],['minorSx',t.capMinorSx],['priorMajorSx',t.capPriorMajorSx],['varicose',t.capVaricose],['ibd',t.capIBD],['swollenLegs',t.capSwollenLegs],['obesity',t.capObesity],['ami',t.capAMI],['chf',t.capCHF],['sepsis',t.capSepsis],['copd',t.capCOPD],['bedMed',t.capBedMed],['pregnancy',t.capPregnancy],['stillborn',t.capStillborn],['ocp',t.capOCP]].map(([k,label])=>(
                      <div key={k} className="allergy-item" style={{cursor:'pointer',borderColor:cap[k]?'var(--success)':'var(--border)',background:cap[k]?'var(--success-light)':'var(--surface)',transition:'all .15s'}} onClick={()=>capToggle(k,1)}>
                        <div className="ai" style={{background:cap[k]?'var(--success)':'var(--surface-alt)',color:cap[k]?'#fff':'var(--text-muted)',transition:'all .15s'}}>{cap[k]?'✓':'☐'}</div>
                        <div style={{fontSize:'.8rem',color:cap[k]?'var(--success)':'var(--text-secondary)',fontWeight:cap[k]?600:400}}>{label}</div>
                      </div>
                    ))}
                  </div>

                  {/* 2 Point Factors */}
                  <div style={{fontSize:'.85rem',fontWeight:700,color:'#d97706',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>🟡 {t.cap2pt}</div>
                  <div className="allergy-grid" style={{marginBottom:20}}>
                    {[['age6174',t.capAge6174],['majorSx',t.capMajorSx],['malig',t.capMalig],['bedConf',t.capBedConf],['immobCast',t.capImmobCast],['cvc',t.capCVC]].map(([k,label])=>(
                      <div key={k} className="allergy-item" style={{cursor:'pointer',borderColor:cap[k]?'var(--warning-border)':'var(--border)',background:cap[k]?'var(--warning-light)':'var(--surface)',transition:'all .15s'}} onClick={()=>capToggle(k,2)}>
                        <div className="ai" style={{background:cap[k]?'var(--warning)':'var(--surface-alt)',color:cap[k]?'#fff':'var(--text-muted)',transition:'all .15s'}}>{cap[k]?'✓':'☐'}</div>
                        <div style={{fontSize:'.8rem',color:cap[k]?'#92400e':'var(--text-secondary)',fontWeight:cap[k]?600:400}}>{label}</div>
                      </div>
                    ))}
                  </div>

                  {/* 3 Point Factors */}
                  <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--orange)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>🟠 {t.cap3pt}</div>
                  <div className="allergy-grid" style={{marginBottom:20}}>
                    {[['age75',t.capAge75],['svt',t.capSVT],['famHx',t.capFamHx],['fvl',t.capFVL],['pt20210',t.capPT20210],['lac',t.capLAC],['acl',t.capACL],['homocys',t.capHomocys],['hitCap',t.capHIT],['otherThrombo',t.capOtherThrombo],['spinalFx',t.capSpinalFx],['gcs',t.capGCS]].map(([k,label])=>(
                      <div key={k} className="allergy-item" style={{cursor:'pointer',borderColor:cap[k]?'var(--orange-border)':'var(--border)',background:cap[k]?'var(--orange-light)':'var(--surface)',transition:'all .15s'}} onClick={()=>capToggle(k,3)}>
                        <div className="ai" style={{background:cap[k]?'var(--orange)':'var(--surface-alt)',color:cap[k]?'#fff':'var(--text-muted)',transition:'all .15s'}}>{cap[k]?'✓':'☐'}</div>
                        <div style={{fontSize:'.8rem',color:cap[k]?'#9a3412':'var(--text-secondary)',fontWeight:cap[k]?600:400}}>{label}</div>
                      </div>
                    ))}
                  </div>

                  {/* 5 Point Factors */}
                  <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--danger)',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>🔴 {t.cap5pt}</div>
                  <div className="allergy-grid" style={{marginBottom:20}}>
                    {[['arthro5',t.capArthro5],['hipFx',t.capHipFx],['multiTrauma',t.capMultiTrauma],['sci',t.capSCI],['strokeCap',t.capStroke]].map(([k,label])=>(
                      <div key={k} className="allergy-item" style={{cursor:'pointer',borderColor:cap[k]?'var(--danger-border)':'var(--border)',background:cap[k]?'var(--danger-light)':'var(--surface)',transition:'all .15s'}} onClick={()=>capToggle(k,5)}>
                        <div className="ai" style={{background:cap[k]?'var(--danger)':'var(--surface-alt)',color:cap[k]?'#fff':'var(--text-muted)',transition:'all .15s'}}>{cap[k]?'✓':'☐'}</div>
                        <div style={{fontSize:'.8rem',color:cap[k]?'#991b1b':'var(--text-secondary)',fontWeight:cap[k]?600:400}}>{label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* ===== ACCP Recommendation Table ===== */}
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#eef2ff',color:'#4f46e5'}}>📊</div><h2>{lang==='th'?'ตาราง ACCP Guideline':'ACCP Guideline Table'}</h2></div>
                <div className="card-body">
                  <div style={{overflowX:'auto'}}>
                  <table className="periop-table">
                    <thead><tr><th>Caprini</th><th>0</th><th>1–2</th><th>3–4</th><th>≥5</th></tr></thead>
                    <tbody>
                      <tr><td className="sx-type">VTE risk</td><td style={{background:capScore===0?'var(--success-light)':''}}>{'<0.5%'}</td><td style={{background:capScore>=1&&capScore<=2?'var(--success-light)':''}}>~1.5%</td><td style={{background:capScore>=3&&capScore<=4?'var(--warning-light)':''}}>~3%</td><td style={{background:capScore>=5?'var(--danger-light)':''}}>{'≥6%'}</td></tr>
                      <tr><td className="sx-type">{lang==='th'?'คำแนะนำ':'Recommendation'}</td><td style={{background:capScore===0?'var(--success-light)':''}}>{lang==='th'?'ไม่ต้อง prophylaxis (1B)':'No prophylaxis (1B)'}</td><td style={{background:capScore>=1&&capScore<=2?'var(--success-light)':''}}>{lang==='th'?'Mechanical (2C)':'Mechanical (2C)'}</td><td style={{background:capScore>=3&&capScore<=4?'var(--warning-light)':''}}>{lang==='th'?'Pharmacological (2B) หรือ Mechanical (2C)':'Pharmacological (2B) or Mechanical (2C)'}</td><td style={{background:capScore>=5?'var(--danger-light)':''}}>{lang==='th'?'Pharmacological ร่วมกับ Mechanical (1B)':'Pharmacological + Mechanical (1B)'}</td></tr>
                    </tbody>
                  </table>
                  </div>
                </div>
              </div>

              {/* ===== Bleeding Risk Toggle ===== */}
              {capScore>=3&&(
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#fef2f2',color:'#dc2626'}}>🩸</div><h2>{t.capBleedRisk}</h2></div>
                <div className="card-body">
                  <div className="periop-sub-tabs">
                    <button className={'periop-sub-tab'+(bleedRisk==='low'?' active':'')} onClick={()=>setBleedRisk('low')} style={{flex:1}}>🟢 {t.capBleedLow}</button>
                    <button className={'periop-sub-tab'+(bleedRisk==='high'?' active':'')} onClick={()=>setBleedRisk('high')} style={{flex:1}}>🔴 {t.capBleedHigh}</button>
                  </div>

                  {/* Recommendation by risk + bleeding */}
                  <div className="step-box" style={{borderColor:capRisk.cls.includes('high')?'var(--danger-border)':'var(--warning-border)',background:capRisk.cls.includes('high')?'var(--danger-light)':'var(--warning-light)'}}>
                    <div className="step-title" style={{color:capRisk.cls.includes('high')?'var(--danger)':'#d97706'}}>
                      {capRisk.level==='moderate'?'🟡':'🔴'} {capRisk.level==='moderate'?t.capModRisk:t.capHighRisk}
                    </div>
                    {bleedRisk==='low'?(
                      <div className="step-content" style={{whiteSpace:'pre-wrap'}}>
                        {'✅ Early mobilization\n'}
                        {capRisk.level==='moderate'?('💉 Enoxaparin SC once daily OR IPC\n🦵 IPC to bilateral legs'):('💉 Enoxaparin SC once daily PLUS IPC\n🦵 IPC to bilateral legs')}
                      </div>
                    ):(
                      <div className="step-content" style={{whiteSpace:'pre-wrap'}}>
                        {'✅ Early mobilization\n🦵 IPC to bilateral legs\n'}
                        <strong style={{color:'var(--danger)'}}>{'⚠️ '}{t.capHighBleedNote}</strong>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              )}

              {/* ===== Enoxaparin Dosing ===== */}
              {capScore>=3&&bleedRisk==='low'&&(
              <div className="card" style={{border:'2px solid var(--accent)',borderColor:'#c7d2fe'}}>
                <div className="card-header" style={{background:'linear-gradient(135deg,#4f46e5,#6366f1)',borderBottom:'none'}}><div className="card-icon" style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>💉</div><h2 style={{color:'#fff'}}>{t.capEnoxTitle}</h2></div>
                <div className="card-body">
                  <div style={{overflowX:'auto'}}>
                  <table className="periop-table">
                    <thead><tr><th>{lang==='th'?'น้ำหนัก':'Weight'}</th><th>{lang==='th'?'ขนาดยา (CrCl ≥ 30)':'Dose (CrCl ≥ 30)'}</th></tr></thead>
                    <tbody>
                      <tr style={{background:weight&&+weight<40?'var(--accent-light)':''}}><td className="sx-type">{t.capEnoxWt1}</td><td className="dose-cell">{t.capEnoxD1}</td></tr>
                      <tr style={{background:weight&&+weight>=40&&+weight<=150?'var(--accent-light)':''}}><td className="sx-type">{t.capEnoxWt2}</td><td className="dose-cell">{t.capEnoxD2}</td></tr>
                      <tr style={{background:weight&&+weight>150?'var(--danger-light)':''}}><td className="sx-type">{t.capEnoxWt3}</td><td className="dose-cell" style={{color:'var(--danger)'}}>{t.capEnoxD3}</td></tr>
                    </tbody>
                  </table>
                  </div>
                  {weight&&(
                    <div className="result-box accent" style={{marginTop:16}}>
                      <div className="result-label">{lang==='th'?'ขนาดยาสำหรับน้ำหนัก '+weight+' kg':'Dose for weight '+weight+' kg'}</div>
                      <div className="result-value" style={{fontSize:'1.1rem'}}>{+weight<40?t.capEnoxD1:+weight<=150?t.capEnoxD2:t.capEnoxD3}</div>
                      {crcl&&crcl<30&&<div style={{marginTop:8,color:'var(--danger)',fontWeight:600,fontSize:'.85rem'}}>⚠️ CrCl {'<'} 30 — {t.capEnoxCrclNote}</div>}
                    </div>
                  )}
                  <div className="alert alert-info" style={{marginTop:12}}><span className="alert-icon">⏰</span><div>{t.capEnoxPreop}<br/><br/>{t.capEnoxPostop}</div></div>
                  <div className="alert alert-warning" style={{marginTop:8}}><span className="alert-icon">🔬</span><div>{t.capCBCNote}</div></div>
                </div>
              </div>
              )}

              {/* ===== Extended Prophylaxis ===== */}
              {capScore>=3&&(
              <div className="card" style={{border:'2px solid var(--purple-border)'}}>
                <div className="card-header" style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)',borderBottom:'none'}}><div className="card-icon" style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>📅</div><h2 style={{color:'#fff'}}>{t.capExtTitle}</h2></div>
                <div className="card-body">
                  <div className="step-box" style={{borderColor:'var(--danger-border)',background:'var(--danger-light)'}}>
                    <div className="step-title" style={{color:'var(--danger)'}}>🏥 {lang==='th'?'มะเร็ง':'Cancer'}</div>
                    <div className="step-content"><strong>{t.capExtAbdCancer}</strong></div>
                  </div>
                  <div className="step-box" style={{borderColor:'var(--purple-border)',background:'var(--purple-light)'}}>
                    <div className="step-title" style={{color:'var(--purple)'}}>🦴 {lang==='th'?'ข้อสะโพก/กระดูกหัก':'Hip / Fracture'}</div>
                    <div className="step-content"><strong>{t.capExtHipArthro}</strong></div>
                  </div>
                  <div className="step-box" style={{borderColor:'var(--info-border)',background:'var(--info-light)'}}>
                    <div className="step-title" style={{color:'var(--info)'}}>🦵 {lang==='th'?'ข้อเข่า':'Knee'}</div>
                    <div className="step-content"><strong>{t.capExtKneeArthro}</strong></div>
                  </div>
                  <div className="step-box">
                    <div className="step-title" style={{color:'var(--text-secondary)'}}>🏥 {lang==='th'?'อื่นๆ':'Others'}</div>
                    <div className="step-content">{t.capExtOther}</div>
                  </div>
                  <div className="alert alert-info" style={{marginTop:12}}><span className="alert-icon">💊</span><div><strong>DOAC/ASA:</strong><br/>{t.capExtDOAC}<br/>{t.capExtASA}</div></div>
                </div>
              </div>
              )}

              {/* ===== Contraindications ===== */}
              <div className="card" style={{border:'2px solid var(--danger-border)'}}>
                <div className="card-header" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',borderBottom:'none'}}><div className="card-icon" style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>🚫</div><h2 style={{color:'#fff'}}>{t.capContraTitle}</h2></div>
                <div className="card-body">
                  <div className="two-col">
                    <div>
                      <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--danger)',marginBottom:10}}>🚫 {t.capContraPharm}</div>
                      <ul className="clinical-notes">
                        {[t.capCI1,t.capCI2,t.capCI3,t.capCI4,t.capCI5,t.capCI6,t.capCI7,t.capCI8,t.capCI9,t.capCI10,t.capCI11,t.capCI12,t.capCI13].map((ci,i)=>(<li key={i}>{ci}</li>))}
                      </ul>
                    </div>
                    <div>
                      <div style={{fontSize:'.85rem',fontWeight:700,color:'var(--orange)',marginBottom:10}}>🚫 {t.capContraIPC}</div>
                      <ul className="clinical-notes">
                        {[t.capCIIPC1,t.capCIIPC2,t.capCIIPC3,t.capCIIPC4,t.capCIIPC5,t.capCIIPC6].map((ci,i)=>(<li key={i}>{ci}</li>))}
                      </ul>
                    </div>
                  </div>
                </div>
              </div>

              <div className="info-box" style={{marginTop:12}}>{t.capRef}</div>
            </div>
          )}

          {/* === HOLD / RESUME TIMELINE === */}
          {periopSub==='timeline'&&(
            <div className="animate-in">
              {/* HOLD - Preop */}
              <div className="card timeline-card">
                <div className="card-header"><div className="card-icon">⏸️</div><h2>{t.holdTitle}</h2></div>
                <div className="card-body">
                  <div className="tl-row"><div className="tl-icon preop">💉</div><div className="tl-body"><div className="tl-drug">{t.holdEnoxProph}</div><div className="tl-detail"><span className="tl-time">{t.holdEnoxProphTime}</span></div></div></div>
                  <div className="tl-row"><div className="tl-icon preop">💉</div><div className="tl-body"><div className="tl-drug">{t.holdEnoxTher}</div><div className="tl-detail"><span className="tl-time">{t.holdEnoxTherTime}</span></div></div></div>
                  <div className="tl-row"><div className="tl-icon preop">💉</div><div className="tl-body"><div className="tl-drug">{t.holdTinz}</div><div className="tl-detail"><span className="tl-time">{t.holdTinzTime}</span></div></div></div>
                  <div className="tl-row"><div className="tl-icon preop">💊</div><div className="tl-body"><div className="tl-drug">{t.holdFonda}</div><div className="tl-detail"><span className="tl-time">{t.holdFondaTime}</span></div></div></div>
                  <div className="tl-row"><div className="tl-icon preop">💧</div><div className="tl-body"><div className="tl-drug">{t.holdUFHiv}</div><div className="tl-detail"><span className="tl-time">{t.holdUFHivTime}</span></div></div></div>
                  <div className="tl-row"><div className="tl-icon preop">💧</div><div className="tl-body"><div className="tl-drug">{t.holdUFHsc}</div><div className="tl-detail"><span className="tl-time">{t.holdUFHscTime}</span></div></div></div>
                  <div className="alert alert-warning" style={{marginTop:16}}><span className="alert-icon">⚠️</span><div>{t.holdNote}</div></div>
                </div>
              </div>

              {/* RESUME - Postop */}
              <div className="card" style={{border:'2px solid var(--success-border)'}}>
                <div className="card-header" style={{background:'linear-gradient(135deg,#059669,#047857)',borderBottom:'none'}}><div className="card-icon" style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>▶️</div><h2 style={{color:'#fff'}}>{t.holdPostTitle}</h2></div>
                <div className="card-body">
                  <div style={{overflowX:'auto'}}>
                  <table className="periop-table">
                    <thead><tr><th></th><th>{lang==='th'?'ขนาดป้องกัน':'Prophylactic dose'}</th><th>{lang==='th'?'ขนาดรักษา':'Therapeutic dose'}</th></tr></thead>
                    <tbody>
                      <tr><td className="sx-type" style={{display:'flex',alignItems:'center',gap:6}}><div className="tl-icon postop" style={{width:28,height:28,fontSize:12}}>🟢</div>{t.resumeLowRisk}</td><td className="dose-cell">{t.resumeLowProph}</td><td className="dose-cell">{t.resumeLowTher}</td></tr>
                      <tr><td className="sx-type" style={{display:'flex',alignItems:'center',gap:6}}><div className="tl-icon preop" style={{width:28,height:28,fontSize:12}}>🟡</div>{t.resumeHighRisk}</td><td className="dose-cell">{t.resumeHighProph}</td><td className="dose-cell">{t.resumeHighTher}</td></tr>
                    </tbody>
                  </table>
                  </div>
                  <div className="alert alert-info" style={{marginTop:16}}><span className="alert-icon">ℹ️</span><div>{t.resumeNote}</div></div>
                  <div className="alert alert-purple" style={{marginTop:8}}><span className="alert-icon">💉</span><div>{t.resumeEpiNote}</div></div>
                </div>
              </div>

              {/* Visual Timeline */}
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#eef2ff',color:'#4f46e5'}}>📊</div><h2>{lang==='th'?'สรุป Timeline':'Timeline Summary'}</h2></div>
                <div className="card-body">
                  <div style={{overflowX:'auto'}}>
                  <table className="periop-table">
                    <thead><tr><th>{lang==='th'?'ยา':'Drug'}</th><th>{lang==='th'?'หยุดก่อนผ่า':'Hold preop'}</th><th>{lang==='th'?'เริ่มหลังผ่า (ป้องกัน)':'Resume postop (proph)'}</th><th>{lang==='th'?'เริ่มหลังผ่า (รักษา)':'Resume postop (ther)'}</th></tr></thead>
                    <tbody>
                      <tr><td className="sx-type">Enoxaparin (proph)</td><td className="dose-cell">12h</td><td className="dose-cell">6–12h (low) / 24–48h (high)</td><td className="dose-cell">—</td></tr>
                      <tr><td className="sx-type">Enoxaparin (ther)</td><td className="dose-cell">24h</td><td className="dose-cell">—</td><td className="dose-cell">24h (low) / 48–72h (high)</td></tr>
                      <tr><td className="sx-type">Tinzaparin / Bemiparin</td><td className="dose-cell">24h</td><td className="dose-cell">6–12h (low) / 24–48h (high)</td><td className="dose-cell">24h (low) / 48–72h (high)</td></tr>
                      <tr><td className="sx-type">Fondaparinux</td><td className="dose-cell">36–48h</td><td className="dose-cell">6–8h postop</td><td className="dose-cell">48–72h</td></tr>
                      <tr><td className="sx-type">UFH IV</td><td className="dose-cell">4–6h</td><td className="dose-cell">6–12h</td><td className="dose-cell">12–24h</td></tr>
                      <tr><td className="sx-type">UFH SC</td><td className="dose-cell">8–12h</td><td className="dose-cell">6–12h</td><td className="dose-cell">—</td></tr>
                    </tbody>
                  </table>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* === UFH NO LOADING === */}
          {periopSub==='noload'&&(
            <div className="animate-in">
              <div className="card" style={{border:'2px solid var(--orange-border)'}}>
                <div className="card-header" style={{background:'linear-gradient(135deg,#ea580c,#c2410c)',borderBottom:'none'}}><div className="card-icon" style={{background:'rgba(255,255,255,.2)',color:'#fff'}}>💧</div><h2 style={{color:'#fff'}}>{t.noLoadTitle}</h2></div>
                <div className="card-body">
                  <div className="alert alert-orange"><span className="alert-icon">💡</span><div>{t.noLoadDesc}</div></div>

                  {/* When to omit */}
                  <div style={{fontSize:'.9rem',fontWeight:700,color:'var(--text)',marginTop:16,marginBottom:12}}>{t.noLoadWhen}</div>
                  <ul className="clinical-notes">
                    <li>{t.noLoadInd1}</li>
                    <li>{t.noLoadInd2}</li>
                    <li>{t.noLoadInd3}</li>
                    <li>{t.noLoadInd4}</li>
                    <li>{t.noLoadInd5}</li>
                  </ul>

                  {/* Protocol boxes */}
                  <div style={{fontSize:'.9rem',fontWeight:700,color:'var(--text)',marginTop:24,marginBottom:12}}>{t.noLoadProtocol}</div>
                  <div className="noload-box"><div className="noload-title">🫀 {lang==='th'?'หลัง Thrombolysis':'Post-Thrombolysis'}</div><div className="noload-content"><strong>{t.noLoadRate1}</strong></div></div>
                  <div className="noload-box"><div className="noload-title">🏥 Periop Bridging</div><div className="noload-content"><strong>{t.noLoadRate2}</strong></div></div>
                  <div className="noload-box"><div className="noload-title">❤️ {lang==='th'?'หลังผ่าตัดหัวใจ':'Post-Cardiac Surgery'}</div><div className="noload-content"><strong>{t.noLoadRate3}</strong></div></div>
                  <div className="noload-box"><div className="noload-title">💊 GP IIb/IIIa</div><div className="noload-content"><strong>{t.noLoadRate4}</strong></div></div>

                  <div className="alert alert-info" style={{marginTop:16}}><span className="alert-icon">📘</span><div>{t.noLoadMonitor}</div></div>
                  <div className="info-box" style={{marginTop:8}}>{t.noLoadMixNote}</div>

                  {/* Calculator */}
                  <div style={{fontSize:'.9rem',fontWeight:700,color:'var(--text)',marginTop:24,marginBottom:12}}>🧮 {t.noLoadCalcTitle}</div>
                  <div className="form-grid cols-3">
                    <div className="form-group"><label>{t.weight}</label><input value={weight} disabled placeholder="—"/></div>
                    <div className="form-group"><label>{t.noLoadCalcRate}</label><select value={noLoadRate} onChange={e=>setNoLoadRate(e.target.value)}><option value="10">10 U/kg/hr</option><option value="12">12 U/kg/hr</option><option value="15">15 U/kg/hr</option><option value="18">18 U/kg/hr (standard)</option></select></div>
                    <div className="form-group"><label>{t.noLoadCalcResult}</label><input value={noLoadCalc?noLoadCalc.rateU+' U/hr':'—'} disabled/></div>
                  </div>
                  {noLoadCalc && (
                    <div className="result-box accent" style={{marginTop:16}}>
                      <div className="result-label">{t.noLoadCalcResult}</div>
                      <div className="result-value">{fmtNum(noLoadCalc.rateU)} U/hr</div>
                      <div className="result-row" style={{marginTop:8}}><span className="label">{t.ufhMixPump100}</span><span className="value">{noLoadCalc.ml100} {t.ufhMixPumpUnit}</span></div>
                      <div className="result-row"><span className="label">{t.ufhMixPump50}</span><span className="value">{noLoadCalc.ml50} {t.ufhMixPumpUnit}</span></div>
                      <div style={{marginTop:12,fontSize:'.8rem',color:'var(--text-secondary)',fontStyle:'italic'}}>No bolus — {lang==='th'?'ปรับ aPTT หลัง 6 ชม.':'adjust per aPTT at 6h'}</div>
                    </div>
                  )}
                  {!weight && <div className="alert alert-warning" style={{marginTop:12}}><span className="alert-icon">ℹ️</span><div>{t.crclNeeded}</div></div>}
                </div>
              </div>

              {/* Comparison: Loading vs No-Loading */}
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#eef2ff',color:'#4f46e5'}}>⚖️</div><h2>{lang==='th'?'เปรียบเทียบ Loading vs No-Loading':'Loading vs No-Loading Comparison'}</h2></div>
                <div className="card-body">
                  <div style={{overflowX:'auto'}}>
                  <table className="periop-table">
                    <thead><tr><th></th><th>{lang==='th'?'Standard (มี Loading)':'Standard (with Loading)'}</th><th>{lang==='th'?'No-Loading':'No-Loading'}</th></tr></thead>
                    <tbody>
                      <tr><td className="sx-type">Bolus</td><td>80 U/kg IV</td><td style={{color:'var(--danger)',fontWeight:600}}>{lang==='th'?'ไม่ให้':'None'}</td></tr>
                      <tr><td className="sx-type">Infusion</td><td>18 U/kg/hr</td><td className="dose-cell">10–15 U/kg/hr</td></tr>
                      <tr><td className="sx-type">Max rate</td><td>{lang==='th'?'ไม่จำกัด (ตาม nomogram)':'Per nomogram'}</td><td className="dose-cell">1,000 U/hr (post-lysis)</td></tr>
                      <tr><td className="sx-type">{lang==='th'?'ข้อบ่งใช้':'Indication'}</td><td>{lang==='th'?'VTE, ACS มาตรฐาน':'Standard VTE, ACS'}</td><td>{lang==='th'?'หลัง lysis, periop, หลังผ่าตัด':'Post-lysis, periop, post-surgical'}</td></tr>
                      <tr><td className="sx-type">aPTT</td><td>{lang==='th'?'ตรวจ 6 ชม.':'Check at 6h'}</td><td>{lang==='th'?'ตรวจ 6 ชม.':'Check at 6h'}</td></tr>
                    </tbody>
                  </table>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {tab==='reversal'&&(
        <div className="animate-in">
          <div className="two-col">
            <div className="card">
              <div className="card-header"><div className="card-icon" style={{background:'#fef2f2',color:'#dc2626'}}>🩸</div><h2>{t.ufh}</h2></div>
              <div className="card-body">
                <div className="form-grid cols-2">
                  <div className="form-group"><label>{t.route}</label><select value={route} onChange={e=>setRoute(e.target.value)}><option value="iv">{t.iv}</option><option value="sc">{t.sc}</option></select></div>
                  <div className="form-group"><label>{t.scenario}</label><select value={scenario} onChange={e=>setScenario(e.target.value)}><option value="major">{t.major}</option><option value="urgent">{t.urgent}</option><option value="overdose">{t.overdose}</option></select></div>
                  <div className="form-group"><label>{t.procedureRisk}</label><select value={procRisk} onChange={e=>setProcRisk(e.target.value)}><option value="low">{t.low}</option><option value="moderate">{t.moderate}</option><option value="high">{t.high}</option><option value="veryHigh">{t.veryHigh}</option></select></div>
                  <div className="form-group"><label>{t.hit}</label><select value={hitSusp} onChange={e=>setHitSusp(e.target.value)}><option value="no">No</option><option value="yes">Yes</option></select></div>
                </div>
                {hitSusp==='yes'&&(<div className="alert alert-danger" style={{marginTop:16}}><span className="alert-icon">🚨</span><div><strong>{t.hitTitle}</strong><br/>{t.hitBody}</div></div>)}
                {route==='iv'?(
                  <div className="form-grid cols-2" style={{marginTop:16}}>
                    <div className="form-group"><label>{t.heparinRate}</label><input type="number" value={hepRate} onChange={e=>setHepRate(e.target.value)} placeholder="1000"/></div>
                    <div className="form-group"><label>{t.heparinBolus}</label><input type="number" value={hepBolus} onChange={e=>setHepBolus(e.target.value)} placeholder="5000"/></div>
                  </div>
                ):(
                  <div className="form-grid" style={{marginTop:16}}><div className="form-group"><label>{t.scDose}</label><input type="number" value={scDose} onChange={e=>setScDose(e.target.value)} placeholder="5000"/></div></div>
                )}
                <div className="form-grid cols-3" style={{marginTop:16}}>
                  <div className="form-group"><label>{t.stopClock}</label><input value={stopClk} onChange={e=>setStopClk(e.target.value)} placeholder="14:30"/></div>
                  <div className="form-group"><label>{t.currentClock}</label><input value={curClk} onChange={e=>setCurClk(e.target.value)} placeholder="16:00"/></div>
                  <div className="form-group"><label>{t.lastDoseTime}</label><input type="number" step="0.5" value={hrsSince} onChange={e=>setHrsSince(e.target.value)} placeholder="override"/></div>
                </div>
                <div className="info-box" style={{marginTop:16}}><strong>{t.autoHours}:</strong> {autoH!==null?autoH+' hr':'—'}<br/><strong>{t.decayModel}:</strong> {route==='iv'?t.decayIV:t.decaySC}</div>
                <div className="form-grid cols-2" style={{marginTop:16}}>
                  <div className="form-group"><label>{t.aptt}</label><input type="number" step="0.1" value={apttR} onChange={e=>setApttR(e.target.value)} placeholder="2.5"/><span className="form-hint">{t.apttHelp}</span></div>
                  <div className="result-box">
                    <div className="result-row"><span className="label">{t.totalExposure}</span><span className="value">{ufh?ufh.exp+' units':'—'}</span></div>
                    <div className="result-row"><span className="label">{t.protamine}</span><span className="value" style={{color:'var(--danger)'}}>{ufh?ufh.ini+' mg':'—'}</span></div>
                    <div className="result-row"><span className="label">{t.additionalDose}</span><span className="value">{ufh?ufh.add+' mg':'—'}</span></div>
                    <div className="result-row"><span className="label">{t.activePercent}</span><span className="value">{ufh?ufh.frac+'%':'—'}</span></div>
                  </div>
                </div>
                {apttSug&&(<div className="alert alert-info" style={{marginTop:16}}><span className="alert-icon">💡</span><div><strong>{t.apttSuggestion}</strong><br/>{apttSug}</div></div>)}
                <div className="badge-row" style={{marginTop:16}}>
                  <span className="badge danger">{t.maxDoseWarning}</span>
                  <span className="badge">{t.reactionWarning}</span>
                  {route==='sc'&&<span className="badge">{t.scNote}</span>}
                </div>
              </div>
            </div>
            <div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#f0f9ff',color:'#0ea5e9'}}>💊</div><h2>{t.enox}</h2></div>
                <div className="card-body">
                  <div className="form-grid cols-2">
                    <div className="form-group"><label>{t.lastDose}</label><input type="number" value={enoxD} onChange={e=>setEnoxD(e.target.value)} placeholder="60"/></div>
                    <div className="form-group"><label>{t.hours}</label><input type="number" step="0.5" value={enoxH} onChange={e=>setEnoxH(e.target.value)} placeholder="4"/></div>
                  </div>
                  <div className="result-box accent" style={{marginTop:16}}><div className="result-label">{t.result}</div><div className="result-value" style={{fontSize:'1.25rem'}}>{enoxProt||'—'}</div></div>
                </div>
              </div>
              <div className="card">
                <div className="card-header"><div className="card-icon" style={{background:'#fffbeb',color:'#f59e0b'}}>📋</div><h2>{t.consult}</h2></div>
                <div className="card-body"><ul className="clinical-notes"><li>{scenAdv}</li><li>{procAdv}</li><li>{t.checkLabs}</li><li>{t.infusionRateWarning}</li></ul></div>
              </div>
            </div>
          </div>
          {/* Protamine Order */}
          {protDose&&protDose>0&&(
            <div className="card order-card animate-in">
              <div className="card-header"><div className="card-icon">💧</div><h2>{t.ordTitle}</h2></div>
              <div className="card-body">
                <div className="order-section"><div className="order-section-title">💊 {t.ordDrug}</div>
                  <div className="order-item"><strong>{t.ordName}</strong>{' '}<span className="dose-hl">{protDose} mg</span>{vials&&<span> = <span className="mono">{vials.ml} mL</span> ({t.ordConc})</span>}<br/>{t.ordDilute} <strong>{t.ordNSS}</strong>{vials&&vials.n>0&&<><br/><span style={{color:'var(--text-muted)',fontSize:'.8rem'}}>({vials.n} {t.ordVialNote})</span></>}</div>
                </div>
                <div className="order-section"><div className="order-section-title">⏱️ {t.ordRate}</div>
                  <div className="order-item">{t.ordIVslow}{' '}<span className="dose-hl">{infTime} {t.ordMinUnit}</span><br/><strong>{t.ordMaxRate}</strong><br/><span style={{fontSize:'.8rem',color:'var(--text-secondary)'}}>{t.ordMaxDose}<br/>{t.ordRepeat}</span></div>
                </div>
                <div className="order-section"><div className="order-section-title">⚠️ {t.ordAllergy}</div>
                  <div className="allergy-grid">
                    <div className="allergy-item"><div className="ai">🐟</div><div><strong>{t.ordFish}</strong><br/><span style={{fontSize:'.75rem',color:'var(--text-secondary)'}}>{t.ordFishD}</span></div></div>
                    <div className="allergy-item"><div className="ai">🔬</div><div><strong>{t.ordVas}</strong><br/><span style={{fontSize:'.75rem',color:'var(--text-secondary)'}}>{t.ordVasD}</span></div></div>
                    <div className="allergy-item"><div className="ai">💉</div><div><strong>{t.ordPrior}</strong><br/><span style={{fontSize:'.75rem',color:'var(--text-secondary)'}}>{t.ordPriorD}</span></div></div>
                    <div className="allergy-item"><div className="ai">🧪</div><div><strong>{t.ordNPH}</strong><br/><span style={{fontSize:'.75rem',color:'var(--text-secondary)'}}>{t.ordNPHD}</span></div></div>
                  </div>
                </div>
                <div className="order-section"><div className="order-section-title">📊 {t.ordMonitor}</div>
                  <div className="monitor-list">
                    <div className="monitor-item"><div className="mi">🫀</div><div className="ml">{t.ordBP}/{t.ordHR}</div><div style={{fontSize:'.7rem',color:'var(--text-muted)',marginTop:2}}>{t.ordFreq}</div></div>
                    <div className="monitor-item"><div className="mi">🫁</div><div className="ml">{t.ordSpO2}</div><div style={{fontSize:'.7rem',color:'var(--text-muted)',marginTop:2}}>{t.ordFreq}</div></div>
                    <div className="monitor-item"><div className="mi">🔬</div><div className="ml">{t.ordAPTT}</div><div style={{fontSize:'.7rem',color:'var(--text-muted)',marginTop:2}}>{t.ordAPTTpost}</div></div>
                  </div>
                </div>
                <div className="order-section"><div className="order-section-title">🚨 {t.ordSE}</div>
                  <div className="se-box"><strong>{t.ordSymptom}:</strong> {t.ordSEtext}<br/><br/><strong>{t.ordResus}:</strong> {t.ordEmerg}</div>
                </div>
                <div className="alert alert-orange"><span className="alert-icon">🔄</span><div>{t.ordRebound}</div></div>
                {!ufh&&enoxProt&&(<div className="alert alert-info"><span className="alert-icon">ℹ️</span><div>{t.ordEnoxNote}</div></div>)}
                <button className={'copy-btn'+(copied?' copied':'')} onClick={doCopy}>{copied?'✓ '+t.ordCopied:'📋 '+t.ordCopy}</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ===== 4Ts + HIT MANAGEMENT TAB ===== */}
      {tab==='hit4ts'&&(
        <div className="animate-in">
          {/* 4Ts Calculator */}
          <div className="card">
            <div className="card-header"><div className="card-icon" style={{background:'#fef2f2',color:'#dc2626'}}>🔬</div><h2>{t.hit4ts}</h2></div>
            <div className="card-body">
              <div className="score-grid">
                <div className="form-group"><label>{t.thrombocytopenia}</label><select value={fT.tc} onChange={e=>setFT(p=>({...p,tc:e.target.value}))}><option value="0">0 — {t.tcOpts[0]}</option><option value="1">1 — {t.tcOpts[1]}</option><option value="2">2 — {t.tcOpts[2]}</option></select></div>
                <div className="form-group"><label>{t.timing}</label><select value={fT.tm} onChange={e=>setFT(p=>({...p,tm:e.target.value}))}><option value="0">0 — {t.tmOpts[0]}</option><option value="1">1 — {t.tmOpts[1]}</option><option value="2">2 — {t.tmOpts[2]}</option></select></div>
                <div className="form-group"><label>{t.thrombosis}</label><select value={fT.th} onChange={e=>setFT(p=>({...p,th:e.target.value}))}><option value="0">0 — {t.thOpts[0]}</option><option value="1">1 — {t.thOpts[1]}</option><option value="2">2 — {t.thOpts[2]}</option></select></div>
                <div className="form-group"><label>{t.otherCauses}</label><select value={fT.oc} onChange={e=>setFT(p=>({...p,oc:e.target.value}))}><option value="0">0 — {t.ocOpts[0]}</option><option value="1">1 — {t.ocOpts[1]}</option><option value="2">2 — {t.ocOpts[2]}</option></select></div>
                <div className={'score-result '+hitProb.cls}>
                  <div className="score-number">{hitSc}</div>
                  <div style={{fontSize:'.8rem',color:'inherit',opacity:.7,marginTop:4}}>{t.score}: {hitSc}/8</div>
                  <div className="score-label">{hitProb.text}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Diagnostic Action Based on Score */}
          <div className={'card pathway-card animate-in'}>
            <div className="card-header"><div className="card-icon">🗺️</div><h2>{t.hitPathTitle}</h2></div>
            <div className="card-body">
              {/* Action based on score */}
              <div className="step-box" style={{borderColor: hitProb.level==='low'?'var(--success-border)':hitProb.level==='int'?'var(--warning-border)':'var(--danger-border)', background: hitProb.level==='low'?'var(--success-light)':hitProb.level==='int'?'var(--warning-light)':'var(--danger-light)'}}>
                <div className="step-title" style={{color: hitProb.level==='low'?'var(--success)':hitProb.level==='int'?'#d97706':'var(--danger)'}}>
                  {hitProb.level==='low'?'🟢':hitProb.level==='int'?'🟡':'🔴'} {t.hitDx}
                </div>
                <div className="step-content" style={{whiteSpace:'pre-wrap'}}>{hitActionText}</div>
              </div>

              {/* ICU Warning */}
              {hitProb.level==='low'&&(
                <div className="alert alert-danger">
                  <span className="alert-icon">⚠️</span>
                  <div><strong>CAUTION</strong><br/>{t.icuWarning}</div>
                </div>
              )}

              {/* 3 Do's, 3 Don'ts, 3 Diagnostics */}
              {hitSc>=4&&(
                <>
                <div style={{marginTop:16,marginBottom:12,fontSize:'.9rem',fontWeight:600,color:'var(--text)'}}>{t.hitMgmtTitle}</div>
                <div className="ddd-grid">
                  <div className="ddd-box do-box">
                    <h3>✅ 3 Do's</h3>
                    <ul className="ddd-list"><li>{t.do1}</li><li>{t.do2}</li><li>{t.do3}</li></ul>
                  </div>
                  <div className="ddd-box dont-box">
                    <h3>🚫 3 Don'ts</h3>
                    <ul className="ddd-list"><li>{t.dont1}</li><li>{t.dont2}</li><li>{t.dont3}</li></ul>
                  </div>
                  <div className="ddd-box diag-box">
                    <h3>🔬 3 Diagnostics</h3>
                    <ul className="ddd-list"><li>{t.diag1}</li><li>{t.diag2}</li><li>{t.diag3}</li></ul>
                  </div>
                </div>
                </>
              )}

              {/* Lab Investigations */}
              {hitSc>=4&&(
                <div style={{marginTop:20}}>
                  <div style={{fontSize:'.9rem',fontWeight:600,color:'var(--text)',marginBottom:12}}>🧪 {t.hitLabTitle}</div>
                  <div className="step-box" style={{borderColor:'var(--purple-border)'}}>
                    <div className="step-title lab">🔍 {t.hitScreening}</div>
                    <div className="step-content" style={{whiteSpace:'pre-wrap'}}>{t.hitScreenList}</div>
                  </div>
                  <div className="step-box" style={{borderColor:'var(--orange-border)'}}>
                    <div className="step-title drug">🧫 {t.hitConfirm}</div>
                    <div className="step-content" style={{whiteSpace:'pre-wrap'}}>{t.hitConfirmList}</div>
                  </div>
                  <div className="alert alert-purple">
                    <span className="alert-icon">🇹🇭</span>
                    <div>{t.hitConfirmNote}</div>
                  </div>
                </div>
              )}

              {/* Alternative Anticoagulants */}
              {hitSc>=4&&(
                <div style={{marginTop:20}}>
                  <div style={{fontSize:'.9rem',fontWeight:600,color:'var(--text)',marginBottom:12}}>💊 {t.hitAltTitle}</div>
                  <div className="step-box" style={{borderColor:'var(--success-border)',background:'var(--success-light)'}}>
                    <div className="step-title do">💉 {t.fondaTitle}</div>
                    <div className="step-content" style={{whiteSpace:'pre-wrap',fontFamily:"'JetBrains Mono',monospace",fontWeight:500}}>{t.fondaDose}</div>
                  </div>
                  <div className="step-box">
                    <div className="step-title drug">💊 {t.doacTitle}</div>
                    <table className="drug-table">
                      <thead><tr><th>Drug</th><th>{lang==='th'?'ไม่มี thrombosis':'No thrombosis'}</th><th>{lang==='th'?'มี thrombosis':'With thrombosis'}</th></tr></thead>
                      <tbody>
                        <tr><td className="drug-name">Rivaroxaban</td><td>15 mg BID → PLT ปกติ → 20 mg OD</td><td>15 mg BID × 3 wk → 20 mg OD</td></tr>
                        <tr><td className="drug-name">Apixaban</td><td>10 mg BID → PLT ปกติ → 5 mg BID</td><td>10 mg BID × 1 wk → 5 mg BID</td></tr>
                        <tr><td className="drug-name">Dabigatran</td><td>150 mg BID → PLT ปกติ</td><td>Fondaparinux ≥5d → 150 mg BID</td></tr>
                        <tr><td className="drug-name">Edoxaban</td><td>60 mg (or 30 mg) OD → PLT ปกติ</td><td>Fondaparinux ≥5d → 60/30 mg OD</td></tr>
                      </tbody>
                    </table>
                  </div>
                  <div className="alert alert-warning">
                    <span className="alert-icon">⚠️</span>
                    <div><strong>Warfarin:</strong> {t.warfarinNote}<br/><strong>{t.durationNoThromb}</strong> | <strong style={{color:'var(--danger)'}}>{t.durationThromb}</strong></div>
                  </div>
                  <div className="alert alert-info">
                    <span className="alert-icon">📈</span>
                    <div>{t.plateletRecovery}</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      <div className="disclaimer">{t.disclaimer}</div>
      <footer className="app-footer">
        {t.footerPrefix}
        <a href="mailto:Uradev222@gmail.com">{t.footerCredit}</a>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
